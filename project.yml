name: WellbeingApp
options:
  bundleIdPrefix: com.wellbeing
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: he
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    INFOPLIST_KEY_CFBundleDisplayName: "מדד רווחה"

targets:
  WellbeingApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WellbeingApp
        excludes:
          - "**/.DS_Store"
    resources:
      - path: WellbeingApp/Resources
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wellbeing.app
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_CFBundleDisplayName: "מדד רווחה"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        UIAppFonts:
          - Heebo.ttf

  WellbeingAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WellbeingAppTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: WellbeingApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wellbeing.app.tests
        GENERATE_INFOPLIST_FILE: true

  WellbeingAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WellbeingAppUITests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: WellbeingApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wellbeing.app.uitests
        GENERATE_INFOPLIST_FILE: true
